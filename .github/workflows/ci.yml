name: CI

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  sc-idx-orchestration:
    name: SC_IDX orchestration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sc-idx-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sc-idx-
      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run SC_IDX orchestration tests
        run: |
          set -euo pipefail
          pytest -q \
            tests/test_run_pipeline.py \
            tests/test_run_pipeline_helpers.py \
            tests/test_run_daily_selection.py \
            tests/test_run_daily_guards.py \
            tests/test_run_daily_oracle_preflight.py \
            tests/test_run_daily_trading_days.py \
            tests/test_market_data_readiness.py \
            tests/test_index_engine_impute_replacement.py
      - name: Run LangGraph smoke orchestration
        run: |
          set -euo pipefail
          python tools/index_engine/run_pipeline.py \
            --smoke \
            --smoke-scenario degraded \
            --restart \
            --report-dir artifacts/sc_idx_pipeline_smoke
      - name: Upload SC_IDX smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sc-idx-pipeline-smoke
          path: artifacts/sc_idx_pipeline_smoke

  guard-secrets:
    name: Ensure sensitive files are ignored
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify that sensitive files are not committed
        run: |
          set -euo pipefail
          files=$(git ls-files -- ':**/.env' ':**/wallet/**')
          if [ -n "$files" ]; then
            echo "The following sensitive files are committed:" >&2
            echo "$files" >&2
            exit 1
          fi
          echo "No tracked .env or wallet files detected."

  guard-forbidden-terms:
    name: Guard forbidden terms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for forbidden provider terms
        run: |
          set -euo pipefail
          python3 tools/guard_forbidden_terms.py

  persona-guard:
    name: Persona guard (manual eval lives in persona-eval)
    runs-on: ubuntu-latest
    steps:
      - name: Provide guidance
        env:
          EVAL_BASE_URL: ${{ secrets.EVAL_BASE_URL }}
        run: |
          {
            echo "## Persona guard";
            echo "Full persona evaluation runs only via the **Persona eval** workflow (manual dispatch).";
            if [ -n "${EVAL_BASE_URL}" ]; then
              echo "- Secret \`EVAL_BASE_URL\` is configured; the manual persona eval can run when needed.";
            else
              echo "- Secret \`EVAL_BASE_URL\` is not configured; set it to enable manual persona eval runs.";
            fi
            echo;
            echo "Use **Actions → Persona eval → Run workflow** to execute the full evaluation when you need persona coverage.";
          } >> "$GITHUB_STEP_SUMMARY"

  vrt-changes:
    name: Detect VRT paths
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - "website_django/templates/**"
              - "website_django/static/**"
              - "website_django/core/**"
              - ".github/workflows/**"

  vrt-mobile:
    name: Mobile VRT (desktop hard gate)
    runs-on: ubuntu-latest
    needs: vrt-changes
    if: github.event_name != 'pull_request' && needs.vrt-changes.outputs.ui == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure smoke VRT for pull requests
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          echo "VRT_SMOKE=1" >> "$GITHUB_ENV"
          echo "VRT_FORCE_VIEWPORT=360x800" >> "$GITHUB_ENV"
          echo "VRT_FORCE_PAGES=home" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: website_django/package-lock.json
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('website_django/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python3 -m pip install -r website_django/requirements.txt
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('website_django/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Node dependencies
        run: |
          set -euo pipefail
          cd website_django
          npm ci
      - name: Install Playwright browsers
        run: |
          set -euo pipefail
          cd website_django
          if ls ~/.cache/ms-playwright/chromium* >/dev/null 2>&1; then
            echo "Playwright browsers already cached; skipping install."
          else
            npx playwright install --with-deps chromium
          fi
      - name: Capture baseline (main)
        run: |
          set -euo pipefail
          git fetch origin main
          git worktree add /tmp/sustainacore-main origin/main
          cd website_django
          node scripts/run_mobile_vrt_ci.mjs --mode baseline --repo-root /tmp/sustainacore-main
      - name: Capture current (PR)
        run: |
          set -euo pipefail
          cd website_django
          node scripts/run_mobile_vrt_ci.mjs --mode current --repo-root "$GITHUB_WORKSPACE"
      - name: Diff screenshots
        run: |
          set -euo pipefail
          cd website_django
          node scripts/mobile_vrt_diff.mjs
      - name: Upload VRT artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-vrt-artifacts
          path: artifacts/vrt
